---
- name: Install and enable BIRD 2 Internet Routing Daemon
  hosts: all
  become: true
  tasks:

    - name: Include task to create hosts file
      ansible.builtin.include_tasks: includes/create_hosts_file.yml

    - name: Include task to install packages that enable apt over HTTPS
      ansible.builtin.include_tasks: includes/apt_over_https.yml

    - name: Include task to install useful packages
      ansible.builtin.include_tasks: includes/install_useful_packages.yml

    - name: Install the BIRD 2 package
      ansible.builtin.apt:
        name: bird2
        state: present
        update_cache: yes

    - name: Copy BIRD configuration file
      ansible.builtin.copy:
        src: ../files/bird.conf
        dest: /etc/bird/bird.conf
        owner: root
        group: root
        mode: '0644'

    - name: Enable IP forwarding
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes

    - name: Enable and restart the BIRD service
      ansible.builtin.service:
        name: bird
        enabled: yes
        state: restarted

    - name: Wait for BGP sessions to establish
      ansible.builtin.shell: birdc show protocols | grep -c Established
      register: bgp_established
      retries: 30
      delay: 10
      until: bgp_established.stdout | int >= 5
      changed_when: false

    - name: Show BGP peer status
      ansible.builtin.command: birdc show protocols
      register: bird_status
      changed_when: false

    - name: Display BGP peer status
      ansible.builtin.debug:
        var: bird_status.stdout_lines
